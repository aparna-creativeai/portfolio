<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELORÉ — AI Storytelling</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #000;
      position: sticky;
      top: 0;
    }

    header h1 {
      margin: 0;
      letter-spacing: 2px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
    }

    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      opacity: 0.7;
    }

    section {
      padding: 80px 20px;
      max-width: 900px;
      margin: auto;
    }

    .video {
      margin-top: 30px;
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      border: none;
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h1>VELORÉ</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#work">Work</a>
    <a href="#about">About</a>
  </nav>
</header>

<div class="hero" id="home">
  <div>
    <h2>AI Storytelling Films</h2>
    <p>Not a fragrance. A memory.</p>
  </div>
</div>

<section id="work">
  <h2>Featured Film</h2>

  <div class="video">
    <iframe src="https://www.youtube.com/embed/SvL8IVK2Njk"
      allowfullscreen>
    </iframe>
  </div>

</section>

<section id="about">
  <h2>About</h2>
  <p>
    VELORÉ explores emotion, memory, and luxury storytelling through AI-generated visuals.
    Each film is crafted to feel like a premium brand experience.
  </p>
</section>

<footer>
  © 2026 VELORÉ
</footer>

</body>
</html>
