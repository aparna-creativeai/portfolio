<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aparna — AI Storytelling</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: #fff;
}

/* NAV */
header {
  display: flex;
  justify-content: space-between;
  padding: 25px 60px;
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(10,10,10,0.6);
  backdrop-filter: blur(10px);
}

header h1 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 2px;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #ddd;
  font-size: 14px;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  letter-spacing: 3px;
}

.hero p {
  margin-top: 10px;
  opacity: 0.7;
}

/* SECTIONS */
section {
  padding: 120px 20px;
  max-width: 1000px;
  margin: auto;
}

h3 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
}

/* VIDEO */
.video {
  margin-top: 40px;
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}

.video iframe {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 60px;
  opacity: 0.5;
}

</style>
</head>

<body>

<header>
  <h1>APARNA</h1>
  <nav>
    <a href="#work">Work</a>
    <a href="#about">About</a>
  </nav>
</header>

<div class="hero">
  <div>
    <h2>AI Storytelling</h2>
    <p>Cinematic ideas. Crafted with AI.</p>
  </div>
</div>

<section id="work">
  <h3>Featured Film</h3>

  <div class="video">
    <iframe src="https://www.youtube.com/embed/SvL8IVK2Njk" allowfullscreen></iframe>
  </div>
</section>

<section id="about">
  <h3>About</h3>
  <p>
    I create cinematic AI-powered storytelling for brands, blending emotion, visuals and narrative into digital films.
  </p>
</section>

<footer>
  © Aparna — Creative AI Portfolio
</footer>

</body>
</html>
