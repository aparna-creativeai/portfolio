<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aparna — AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #0a0a0a;
  color: #fff;
}

/* NAV */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.8);
}

header h1 {
  margin: 0;
  font-size: 20px;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #aaa;
  transition: 0.3s;
}

nav a:hover {
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 60px;
}

.hero h2 {
  font-size: 48px;
}

/* SECTION */
section {
  padding: 100px 20px;
  max-width: 1000px;
  margin: auto;
}

h3 {
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
}

/* VIDEO */
.video {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}

.video iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  opacity: 0.5;
}

</style>
</head>

<body>

<header>
  <h1>APARNA</h1>
  <nav>
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="hero">
  <div>
    <h2>AI STORYTELLING</h2>
    <p>Future visual narratives</p>
  </div>
</div>

<section id="work">
  <h3>Work</h3>

  <div class="grid">
    <div class="card">
      <div class="video">
        <iframe src="https://www.youtube.com/embed/SvL8IVK2Njk" allowfullscreen></iframe>
      </div>
    </div>

    <div class="card">Coming Soon</div>
    <div class="card">Coming Soon</div>
  </div>
</section>

<section id="about">
  <h3>About</h3>
  <p>I create AI-driven cinematic storytelling and experimental visual films.</p>
</section>

<section id="contact">
  <h3>Contact</h3>
  <p>Email: your@email.com</p>
</section>

<footer>
  © Aparna Portfolio
</footer>

</body>
</html>
