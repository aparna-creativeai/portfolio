<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aparna — Creative AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      font-size: 16px;
    }

    .video-container {
      margin-top: 40px;
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .tagline {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.6;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Dream Fragrance — VELORÉ</h1>
    <p>A cinematic AI-crafted fragrance film exploring memory and emotion.</p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/SvL8IVK2Njk"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>

    <div class="tagline">
      Not a fragrance. A memory.
    </div>
  </div>

</body>
</html>
